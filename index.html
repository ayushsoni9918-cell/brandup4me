
    /* Premium Side Menu Styles */
    .premium-side-menu {
        background-color: #f8f9fa;
        padding: 10px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .premium-side-menu a {
        color: #007bff;
        text-decoration: none;
    }
    .premium-side-menu a:hover {
        text-decoration: underline;
    }
