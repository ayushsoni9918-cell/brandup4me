<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRANDUP4ME</title>

<style>
/* KEEPING YOUR ORIGINAL STYLES + ADDING SIDE MENU ONLY */

/* ===== SIDE MENU (NEW) ===== */
.side-menu{
  position:fixed;
  top:0;
  left:-100%;
  width:280px;
  height:100vh;
  padding:90px 30px;
  display:flex;
  flex-direction:column;
  gap:24px;
  background:rgba(15,15,20,0.9);
  backdrop-filter:blur(20px);
  transition:.45s cubic-bezier(.77,0,.18,1);
  z-index:2000;
  transform:translateX(-40px) scale(.95);
  opacity:0;
}
.side-menu.active{
  left:0;
  transform:translateX(0) scale(1);
  opacity:1;
}
.side-menu a{
  font-size:2rem;
  color:white;
  text-decoration:none;
}
.side-menu .cta{
  background:#C8FF00;
  color:black;
  padding:10px;
  text-align:center;
  border-radius:6px;
}

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  display:none;
  z-index:1500;
}
.overlay.show{display:block;}

.menu-btn{
  display:none;
  position:fixed;
  top:20px;
  left:20px;
  z-index:2100;
  font-size:1.5rem;
  background:none;
  border:none;
  color:white;
}

@media(max-width:768px){
  .menu-btn{display:block;}
}
</style>
</head>

<body>

<!-- NAVBAR (UNCHANGED) -->
<nav id="nav">
  <h2>BRANDUP4ME</h2>
</nav>

<!-- 🔥 NEW SIDE MENU -->
<nav class="side-menu" id="sideMenu">
  <a href="#services">Services</a>
  <a href="#packages">Packages</a>
  <a href="#why">About</a>
  <a href="#contact" class="cta">Let’s Talk →</a>
</nav>

<div class="overlay" id="overlay"></div>
<button class="menu-btn" id="menuBtn">☰</button>

<!-- HERO -->
<section style="height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;">
  <div>
    <h1>YOUR BRAND.<br>LOUDER. BOLDER.</h1>
    <p>We help businesses grow 🚀</p>

    <div style="margin-top:20px;">
      <a href="#" style="background:#C8FF00;padding:10px 20px;color:black;">Start Now</a>
      <a href="#" style="border:1px solid #333;padding:10px 20px;color:white;">View Work</a>
    </div>
  </div>
</section>

<script>

/* SIDE MENU JS */
const menuBtn = document.getElementById("menuBtn");
const sideMenu = document.getElementById("sideMenu");
const overlay = document.getElementById("overlay");

menuBtn.onclick = () => {
  sideMenu.classList.toggle("active");
  overlay.classList.toggle("show");
};

overlay.onclick = () => {
  sideMenu.classList.remove("active");
  overlay.classList.remove("show");
};

document.querySelectorAll(".side-menu a").forEach(link=>{
  link.onclick = ()=>{
    sideMenu.classList.remove("active");
    overlay.classList.remove("show");
  }
});

</script>

</body>
</html>
